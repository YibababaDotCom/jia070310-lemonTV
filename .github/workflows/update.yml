name: Update MIGU-CCTV Real URL

on:
  schedule:
    # 每小时执行一次
    - cron: '33 * * * *'
  workflow_dispatch: # 允许在 GitHub 界面手动触发测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行提取解析脚本
        run: python fetch_cctv5.py

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cctv5.m3u
          git diff-index --quiet HEAD || (git commit -m "Auto update CCTV5 URL" && git push)
